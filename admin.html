<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NUXBET Admin | لوحة التحكم</title>
  <link rel="stylesheet" href="css/style.css?v=4">
  <style>
    .adm-wrap { max-width: 800px; margin: 0 auto; padding: 20px 16px 60px; }
    .adm-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .adm-hdr h1 { font-size: 1.2rem; font-weight: 800; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
    .adm-hdr h1 .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .adm-back { color: var(--green); font-size: 0.82rem; font-weight: 600; text-decoration: none; padding: 6px 16px; border: 1px solid rgba(0,255,135,0.2); border-radius: 20px; transition: all 0.2s; }
    .adm-back:hover { background: rgba(0,255,135,0.08); }

    .adm-section { background: var(--bg-card); border: 1px solid var(--border-dim); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
    .adm-section-title { font-size: 0.85rem; font-weight: 700; color: var(--pl-violet); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .adm-section-title .icon { width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center; font-size: 0.75rem; font-weight: 900; }

    .match-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; margin-bottom: 6px; background: var(--bg-elevated); border-radius: 10px; border: 1px solid var(--border-dim); flex-wrap: wrap; transition: all 0.2s; }
    .match-row:hover { border-color: var(--border-base); }
    .match-row.has-result { border-right: 3px solid var(--green); }
    .match-row .group-tag { font-size: 0.65rem; font-weight: 700; color: var(--pl-magenta); background: rgba(233,0,82,0.08); padding: 2px 8px; border-radius: 10px; }
    .match-row .flag-sm { width: 24px; height: 18px; border-radius: 3px; object-fit: cover; }
    .match-row .team-names { flex: 1; font-size: 0.82rem; font-weight: 600; color: var(--text-body); min-width: 120px; }
    .match-row .date-tag { font-size: 0.7rem; color: var(--text-dim); font-weight: 500; }
    .result-status { font-size: 0.9rem; flex-shrink: 0; }
    .score-box { display: flex; align-items: center; gap: 4px; }
    .score-box input { width: 44px; height: 36px; text-align: center; font-size: 1rem; font-weight: 700; color: var(--text-primary); background: var(--bg-input); border: 1.5px solid var(--border-base); border-radius: 8px; }
    .score-box input:focus { border-color: var(--green); box-shadow: 0 0 8px rgba(0,255,135,0.1); }
    .score-box .dash { color: var(--text-dim); font-weight: 700; font-size: 0.9rem; }

    .rq-section { background: linear-gradient(135deg, rgba(150,60,255,0.06), rgba(233,0,82,0.03)); }
    .rq-input-field { width: 100%; padding: 12px 14px; background: var(--bg-input); border: 1.5px solid rgba(150,60,255,0.15); border-radius: 10px; color: var(--text-primary); font-size: 0.88rem; margin-top: 6px; }
    .rq-input-field:focus { border-color: var(--pl-violet); box-shadow: 0 0 10px rgba(150,60,255,0.08); }

    .answers-list { margin-top: 16px; }
    .answer-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; margin-bottom: 6px; background: var(--bg-elevated); border-radius: 10px; border: 1px solid var(--border-dim); flex-wrap: wrap; }
    .answer-row .player-name { font-size: 0.82rem; font-weight: 600; color: var(--text-body); min-width: 100px; flex: 1; }
    .answer-row .player-answer { font-size: 0.85rem; color: var(--text-primary); font-weight: 500; flex: 2; min-width: 100px; }
    .answer-row .review-btns { display: flex; gap: 4px; flex-shrink: 0; }
    .review-btn { width: 34px; height: 34px; border-radius: 8px; display: grid; place-items: center; font-size: 0.85rem; font-weight: 900; cursor: pointer; border: 1.5px solid var(--border-dim); background: var(--bg-input); color: var(--text-dim); transition: all 0.2s; }
    .review-btn:hover { transform: scale(1.1); }
    .review-btn.correct-active { background: rgba(0,255,135,0.15); border-color: var(--green); color: var(--green); }
    .review-btn.wrong-active { background: rgba(233,0,82,0.15); border-color: var(--pl-magenta); color: var(--pl-magenta); }
    .no-answers { text-align: center; padding: 20px; color: var(--text-dim); font-size: 0.82rem; }

    .save-btn { display: block; width: 100%; padding: 14px; margin-top: 20px; background: var(--grad-green); color: var(--pl-purple); font-size: 0.95rem; font-weight: 700; border-radius: 50px; border: none; cursor: pointer; box-shadow: 0 4px 16px rgba(0,255,135,0.2); transition: all 0.3s; }
    .save-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,255,135,0.3); }
    .save-btn:disabled { opacity: 0.5; cursor: wait; transform: none; }

    @media (max-width: 600px) {
      .match-row { padding: 10px; gap: 6px; }
      .match-row .team-names { font-size: 0.75rem; min-width: 80px; }
      .score-box input { width: 38px; height: 32px; font-size: 0.9rem; }
      .answer-row { padding: 8px 10px; }
      .adm-section { padding: 14px; }
    }
    /* Player prediction editor */
    .ap-header { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .ap-header select { flex: 1; min-width: 180px; }
    .ap-load-btn { padding: 10px 20px; background: linear-gradient(135deg, #0096ff, #0066ff); color: white; font-weight: 700; font-size: 0.82rem; border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .ap-load-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,100,255,0.3); }
    .ap-player-info { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: rgba(0,150,255,0.06); border: 1px solid rgba(0,150,255,0.15); border-radius: 10px; margin-bottom: 14px; font-size: 0.82rem; font-weight: 600; color: var(--blue); }
    .ap-matches-grid { display: flex; flex-direction: column; gap: 6px; }
    .ap-match-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--bg-elevated); border: 1px solid var(--border-dim); border-radius: 10px; transition: all 0.2s; }
    .ap-match-row:hover { border-color: var(--border-base); }
    .ap-match-row.has-pred { border-right: 3px solid var(--green); }
    .ap-match-row.is-golden-row { border-right: 3px solid var(--gold); background: rgba(232,185,35,0.04); }
    .ap-golden-star { font-size: 1.2rem; cursor: pointer; opacity: 0.25; transition: all 0.2s; background: none; border: none; padding: 2px 4px; }
    .ap-golden-star:hover { opacity: 0.7; transform: scale(1.15); }
    .ap-golden-star.active { opacity: 1; color: var(--gold); filter: drop-shadow(0 0 4px rgba(232,185,35,0.5)); }
    .ap-match-info { flex: 1; display: flex; align-items: center; gap: 6px; min-width: 0; }
    .ap-match-info .flag-sm { width: 22px; height: 16px; border-radius: 3px; object-fit: cover; }
    .ap-match-info .team-txt { font-size: 0.75rem; font-weight: 600; color: var(--text-body); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ap-match-info .vs-txt { font-size: 0.6rem; color: var(--text-dim); font-weight: 700; }
    .ap-score-inputs { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .ap-score-inputs input { width: 40px; height: 34px; text-align: center; font-size: 0.95rem; font-weight: 700; color: var(--text-primary); background: var(--bg-input); border: 1.5px solid var(--border-base); border-radius: 8px; }
    .ap-score-inputs input:focus { border-color: var(--green); box-shadow: 0 0 6px rgba(0,255,135,0.1); }
    .ap-score-inputs .dash { color: var(--text-dim); font-weight: 700; font-size: 0.8rem; }
    .ap-match-status { font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 8px; white-space: nowrap; }
    .ap-match-status.played { background: var(--green-soft); color: var(--green); }
    .ap-match-status.upcoming { background: var(--blue-soft); color: var(--blue); }
    .ap-match-status.live { background: var(--red-soft); color: var(--red); }
    .ap-save-btn { display: block; width: 100%; padding: 12px; margin-top: 14px; background: linear-gradient(135deg, #0096ff, #0066ff); color: white; font-size: 0.9rem; font-weight: 700; border-radius: 50px; border: none; cursor: pointer; box-shadow: 0 4px 16px rgba(0,100,255,0.2); transition: all 0.3s; }
    .ap-save-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,100,255,0.3); }
    .ap-empty { text-align: center; padding: 20px; color: var(--text-dim); font-size: 0.82rem; }
    @media (max-width: 600px) {
      .ap-match-row { padding: 8px; gap: 5px; flex-wrap: wrap; }
      .ap-score-inputs input { width: 36px; height: 30px; font-size: 0.85rem; }
      .ap-match-info .team-txt { font-size: 0.68rem; }
    }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div class="auth-overlay" id="admin-login-overlay">
    <div class="auth-card" style="max-width:360px">
      <div class="auth-logo">
        <div class="logo-icon-lg">A</div>
        <span class="logo-text">ADMIN</span>
      </div>
      <p class="auth-tagline">لوحة تحكم الأدمن</p>
      <form class="auth-form" onsubmit="return false">
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="adm-pass" placeholder="••••••••" required dir="ltr">
        </div>
        <div class="auth-error" id="adm-error"></div>
        <button type="submit" class="auth-btn" id="adm-btn" style="background:var(--grad-brand);color:#fff">دخول</button>
      </form>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="adm-wrap" id="admin-app" style="display:none">
    <div class="adm-hdr">
      <h1><span class="dot"></span> لوحة تحكم NUXBET</h1>
      <a href="index.html" class="adm-back">العودة للموقع</a>
    </div>

    <div class="md-tabs" id="admin-tabs"></div>

    <!-- Player Prediction Editor -->
    <div class="adm-section" id="add-pred-section">
      <div class="adm-section-title">
        <span class="icon" style="background:rgba(0,150,255,0.1);color:#0096ff">✎</span>
        تعديل توقعات لاعب
      </div>
      <div class="ap-header">
        <select id="ap-user" class="rq-input-field">
          <option value="">-- اختر اللاعب --</option>
        </select>
        <button class="ap-load-btn" id="ap-load-btn">عرض التوقعات</button>
      </div>
      <div id="ap-player-content">
        <div class="ap-empty">اختر لاعباً ثم اضغط "عرض التوقعات" لعرض وتعديل توقعاته</div>
      </div>
    </div>

    <!-- Match Results -->
    <div class="adm-section" id="results-section">
      <div class="adm-section-title">
        <span class="icon" style="background:rgba(0,255,135,0.1);color:var(--green)">N</span>
        نتائج المباريات
      </div>
      <div id="admin-matches"></div>
    </div>

    <!-- Round Question -->
    <div class="adm-section rq-section">
      <div class="adm-section-title">
        <span class="icon" style="background:rgba(150,60,255,0.1);color:var(--pl-violet)">?</span>
        سؤال الجولة (3 نقاط)
      </div>
      <div style="margin-bottom:14px">
        <label style="font-size:0.78rem;font-weight:600;color:var(--text-muted);display:block;margin-bottom:6px">نص السؤال</label>
        <input type="text" id="rq-question-input" class="rq-input-field" placeholder="مثال: من سيسجل أكثر أهداف في الجولة؟" dir="rtl">
      </div>
      <div class="answers-list" id="rq-answers-list">
        <div class="no-answers">لا توجد إجابات بعد</div>
      </div>
    </div>

    <!-- Cup Re-Draw -->
    <div class="adm-section" id="cup-draw-section">
      <div class="adm-section-title">
        <span class="icon" style="background:rgba(232,185,35,0.1);color:var(--gold)">🏆</span>
        قرعة الكأس
      </div>
      <p style="font-size:0.78rem;color:var(--text-dim);margin-bottom:12px">اضغط لإعادة سحب قرعة الجولة الحالية. ستُحذف القرعة القديمة وتُنشأ قرعة جديدة عشوائية.</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap" id="cup-draw-buttons"></div>
      <div id="cup-draw-status" style="margin-top:10px;font-size:0.78rem;color:var(--text-dim);text-align:center"></div>
    </div>

    <button class="save-btn" id="admin-save">حفظ الكل</button>
    <div class="toast" id="admin-toast"><span class="toast-icon toast-success" id="admin-toast-ico"></span><span id="admin-toast-msg"></span></div>
  </div>

  <script src="js/data.js?v=15"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js';
    import { getFirestore, doc, setDoc, getDoc, getDocs, collection, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCP098hkWvZ9wErY9E8m8XVw2mav0cYyBM",
      authDomain: "nuxbet-1014c.firebaseapp.com",
      projectId: "nuxbet-1014c",
      storageBucket: "nuxbet-1014c.firebasestorage.app",
      messagingSenderId: "753459642708",
      appId: "1:753459642708:web:0440a58a2eced6173088c1"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let activeMD = 1; // Can be number (group) or string (knockout key)
    const ADMIN_PASS = 'lord';

    // Store review decisions: { odUserId: true/false }
    let reviewDecisions = {};

    // Helper: check if current MD is knockout
    function isKO(md) { return typeof md === 'string'; }
    function getDocId(md) { return isKO(md) ? `ko_${md}` : `md${md}`; }

    function adminToast(msg, type='success') {
      const t = document.getElementById('admin-toast');
      document.getElementById('admin-toast-msg').textContent = msg;
      document.getElementById('admin-toast-ico').className = 'toast-icon toast-' + type;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // LOGIN
    document.getElementById('adm-btn').addEventListener('click', () => {
      if (document.getElementById('adm-pass').value === ADMIN_PASS) {
        document.getElementById('admin-login-overlay').style.display = 'none';
        document.getElementById('admin-app').style.display = 'block';
        renderTabs(); renderMatches(activeMD); loadUsersForDropdown(); renderCupDrawButtons();
      } else {
        document.getElementById('adm-error').textContent = 'كلمة المرور غلط';
      }
    });
    document.getElementById('adm-pass').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('adm-btn').click();
    });

    // TABS — Group (1,2,3) + Knockout (R32, R16, QF, SF, 3RD, FINAL)
    function renderTabs() {
      const el = document.getElementById('admin-tabs');
      const allKeys = ALL_MATCHDAY_KEYS; // [1, 2, 3, 'R32', 'R16', 'QF', 'SF', '3RD', 'FINAL']
      el.innerHTML = allKeys.map(md => {
        const info = MATCHDAY_INFO[md];
        const isActive = md === activeMD;
        const icon = info.icon ? info.icon + ' ' : '';
        const koStyle = isKO(md) ? 'style="border-bottom: 2px solid var(--pl-magenta)"' : '';
        return `<button class="md-tab ${isActive ? 'active' : ''}" data-md="${md}" ${koStyle}>${icon}${info.name}</button>`;
      }).join('');
      el.querySelectorAll('.md-tab').forEach(b => {
        b.addEventListener('click', () => {
          const mdVal = b.dataset.md;
          activeMD = isNaN(mdVal) ? mdVal : +mdVal;
          renderTabs(); renderMatches(activeMD);
        });
      });
    }

    // RENDER MATCHES + ROUND QUESTION
    async function renderMatches(md) {
      reviewDecisions = {};
      const el = document.getElementById('admin-matches');
      const matches = isKO(md) ? (KNOCKOUT_MATCHES[md] || []) : (MATCHES[md] || []);
      let saved = {};
      try {
        const snap = await getDoc(doc(db, 'results', getDocId(md)));
        if (snap.exists()) saved = snap.data().matches || {};
      } catch(e) { console.error(e); }

      if (isKO(md)) {
        // Knockout matches
        const roundInfo = KNOCKOUT_ROUNDS[md];
        el.innerHTML = `<div style="font-size:0.75rem;color:var(--pl-magenta);font-weight:700;margin-bottom:10px">${roundInfo.icon} ${roundInfo.name} — ${matches.length} مباراة (×${KNOCKOUT_MULTIPLIERS[md]} نقاط)</div>` +
          matches.map(m => {
            const homeTeam = m.home && TEAMS[m.home] ? TEAMS[m.home] : null;
            const awayTeam = m.away && TEAMS[m.away] ? TEAMS[m.away] : null;
            const r = saved[m.id] || m.result || {};
            const hasResult = r.home !== undefined && r.away !== undefined;
            const isTBD = !homeTeam || !awayTeam;
            const homeName = homeTeam ? homeTeam.name : 'يُحدد لاحقاً';
            const awayName = awayTeam ? awayTeam.name : 'يُحدد لاحقاً';
            const homeFlag = homeTeam ? `<img src="${flagUrl(homeTeam.iso)}" class="flag-sm" alt="">` : '<span style="font-size:1.2rem">❓</span>';
            const awayFlag = awayTeam ? `<img src="${flagUrl(awayTeam.iso)}" class="flag-sm" alt="">` : '<span style="font-size:1.2rem">❓</span>';
            return `<div class="match-row ${hasResult ? 'has-result' : ''}" ${isTBD ? 'style="opacity:0.5"' : ''}>
              <span class="group-tag" style="background:rgba(150,60,255,0.08);color:var(--pl-violet)">${roundInfo.short}</span>
              ${homeFlag}
              <span class="team-names">${homeName} vs ${awayName}</span>
              ${awayFlag}
              <span class="date-tag">${formatMatchDate(m.date)} - ${m.time}</span>
              <div class="score-box">
                <input type="number" id="rh-${m.id}" min="0" max="20" value="${r.home !== undefined ? r.home : ''}" placeholder="-" ${isTBD ? 'disabled' : ''}>
                <span class="dash">-</span>
                <input type="number" id="ra-${m.id}" min="0" max="20" value="${r.away !== undefined ? r.away : ''}" placeholder="-" ${isTBD ? 'disabled' : ''}>
              </div>
              <span class="result-status">${hasResult ? '✅' : isTBD ? '🔒' : '⏳'}</span>
            </div>`;
          }).join('');
      } else {
        // Group stage matches
        el.innerHTML = matches.map(m => {
          const home = TEAMS[m.home], away = TEAMS[m.away];
          const r = saved[m.id] || m.result || {};
          const hasResult = r.home !== undefined && r.away !== undefined;
          return `<div class="match-row ${hasResult ? 'has-result' : ''}">
            <span class="group-tag">${m.group}</span>
            <img src="${flagUrl(home.iso)}" class="flag-sm" alt="">
            <span class="team-names">${home.name} vs ${away.name}</span>
            <img src="${flagUrl(away.iso)}" class="flag-sm" alt="">
            <span class="date-tag">${formatMatchDate(m.date)} - ${m.time}</span>
            <div class="score-box">
              <input type="number" id="rh-${m.id}" min="0" max="20" value="${r.home !== undefined ? r.home : ''}" placeholder="-">
              <span class="dash">-</span>
              <input type="number" id="ra-${m.id}" min="0" max="20" value="${r.away !== undefined ? r.away : ''}" placeholder="-">
            </div>
            <span class="result-status">${hasResult ? '✅' : '⏳'}</span>
          </div>`;
        }).join('');
      }

      // Load round question (works for both group + knockout)
      try {
        const rqSnap = await getDoc(doc(db, 'roundQuestions', getDocId(md)));
        if (rqSnap.exists()) {
          const rqData = rqSnap.data();
          document.getElementById('rq-question-input').value = rqData.question || '';
          if (rqData.reviews) reviewDecisions = { ...rqData.reviews };
        } else {
          document.getElementById('rq-question-input').value = '';
        }
      } catch(e) {
        document.getElementById('rq-question-input').value = '';
      }

      // Load all player answers for this matchday
      await loadPlayerAnswers(md);
    }

    // LOAD PLAYER ANSWERS FOR REVIEW
    async function loadPlayerAnswers(md) {
      const listEl = document.getElementById('rq-answers-list');
      const allUsers = {};
      const answers = [];

      try {
        // Get all users
        const usersSnap = await getDocs(collection(db, 'users'));
        usersSnap.forEach(d => { allUsers[d.id] = d.data(); });

        // Get all predictions for this matchday
        const predsSnap = await getDocs(collection(db, 'predictions'));
        predsSnap.forEach(d => {
          const data = d.data();
          if (data.matchday === md && data.roundAnswer) {
            const user = allUsers[data.userId];
            answers.push({
              odId: data.userId,
              name: user?.displayName || 'مجهول',
              answer: data.roundAnswer,
              reviewed: reviewDecisions[data.userId]
            });
          }
        });
      } catch(e) { console.error(e); }

      if (answers.length === 0) {
        listEl.innerHTML = '<div class="no-answers">لا توجد إجابات بعد</div>';
        return;
      }

      listEl.innerHTML = '<div style="font-size:0.75rem;color:var(--text-dim);margin-bottom:8px;font-weight:600">إجابات اللاعبين — راجعها يدوياً:</div>' +
        answers.map(a => {
          const correctCls = reviewDecisions[a.odId] === true ? 'correct-active' : '';
          const wrongCls = reviewDecisions[a.odId] === false ? 'wrong-active' : '';
          return `<div class="answer-row">
            <span class="player-name">${a.name}</span>
            <span class="player-answer">"${a.answer}"</span>
            <div class="review-btns">
              <button class="review-btn ${correctCls}" data-uid="${a.odId}" data-action="correct" title="صح">&#10003;</button>
              <button class="review-btn ${wrongCls}" data-uid="${a.odId}" data-action="wrong" title="خطأ">&#10007;</button>
            </div>
          </div>`;
        }).join('');

      // Attach review button listeners
      listEl.querySelectorAll('.review-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const uid = btn.dataset.uid;
          const action = btn.dataset.action;
          const row = btn.closest('.answer-row');
          row.querySelectorAll('.review-btn').forEach(b => b.classList.remove('correct-active', 'wrong-active'));
          if (action === 'correct') {
            btn.classList.add('correct-active');
            reviewDecisions[uid] = true;
          } else {
            btn.classList.add('wrong-active');
            reviewDecisions[uid] = false;
          }
        });
      });
    }

    // SAVE ALL — handles both group and knockout
    document.getElementById('admin-save').addEventListener('click', async () => {
      const matches = isKO(activeMD) ? (KNOCKOUT_MATCHES[activeMD] || []) : (MATCHES[activeMD] || []);
      const results = {};
      matches.forEach(m => {
        const hEl = document.getElementById('rh-' + m.id);
        const aEl = document.getElementById('ra-' + m.id);
        if (hEl && aEl && hEl.value !== '' && aEl.value !== '' && !hEl.disabled) {
          results[m.id] = { home: +hEl.value, away: +aEl.value };
        }
      });

      const rqQuestion = document.getElementById('rq-question-input').value.trim();

      const btn = document.getElementById('admin-save');
      btn.disabled = true; btn.textContent = 'جاري الحفظ...';

      try {
        const savedItems = [];
        const docId = getDocId(activeMD);

        // Save results
        if (Object.keys(results).length > 0) {
          await setDoc(doc(db, 'results', docId), { matches: results, updatedAt: serverTimestamp() });
          savedItems.push(`${Object.keys(results).length} نتيجة`);
        }

        // Save round question + manual reviews
        if (rqQuestion) {
          const rqDoc = { question: rqQuestion, reviews: reviewDecisions, updatedAt: serverTimestamp() };
          await setDoc(doc(db, 'roundQuestions', docId), rqDoc);
          savedItems.push('سؤال الجولة');
        }

        if (savedItems.length > 0) {
          adminToast(`تم حفظ ${savedItems.join(' + ')} بنجاح!`);
        } else {
          adminToast('لا يوجد شيء للحفظ', 'warn');
        }
      } catch(e) { console.error(e); adminToast('حصل خطأ في الحفظ', 'error'); }
      btn.disabled = false; btn.textContent = 'حفظ الكل';
    });

    // LOAD USERS FOR DROPDOWN
    async function loadUsersForDropdown() {
      const userSelect = document.getElementById('ap-user');
      try {
        const usersSnap = await getDocs(collection(db, 'users'));
        let opts = '<option value="">-- اختر اللاعب --</option>';
        usersSnap.forEach(d => {
          opts += `<option value="${d.id}">${d.data().displayName || 'مجهول'}</option>`;
        });
        userSelect.innerHTML = opts;
      } catch(e) { console.error('Error loading users', e); }
    }

    // PLAYER PREDICTIONS EDITOR
    let currentPlayerPreds = null;
    let currentPlayerUid = null;

    document.getElementById('ap-load-btn').addEventListener('click', async () => {
      const uid = document.getElementById('ap-user').value;
      if (!uid) { adminToast('يرجى اختيار اللاعب أولاً', 'warn'); return; }

      const btn = document.getElementById('ap-load-btn');
      btn.textContent = 'جاري التحميل...'; btn.disabled = true;

      try {
        const predDocId = isKO(activeMD) ? `${uid}_ko_${activeMD}` : `${uid}_md${activeMD}`;
        const docRef = doc(db, 'predictions', predDocId);
        const snap = await getDoc(docRef);
        
        if (snap.exists()) {
          currentPlayerPreds = snap.data();
        } else {
          currentPlayerPreds = { userId: uid, matchday: activeMD, preds: {}, goldenMatch: null, roundAnswer: '' };
        }
        currentPlayerUid = uid;
        renderPlayerPredictions();
      } catch(e) {
        console.error(e); adminToast('خطأ في تحميل توقعات اللاعب', 'error');
      }
      btn.textContent = 'عرض التوقعات'; btn.disabled = false;
    });

    function renderPlayerPredictions() {
      const container = document.getElementById('ap-player-content');
      if (!currentPlayerPreds) return;

      const matches = isKO(activeMD) ? (KNOCKOUT_MATCHES[activeMD] || []) : (MATCHES[activeMD] || []);
      const userSelect = document.getElementById('ap-user');
      const playerName = userSelect.options[userSelect.selectedIndex].text;
      const mdInfo = MATCHDAY_INFO[activeMD];

      let html = `
        <div class="ap-player-info">
          <span>👤</span> تعديل توقعات: <strong>${playerName}</strong> - ${mdInfo.name}
        </div>
        <div class="ap-matches-grid">
      `;

      matches.forEach(m => {
        const homeTeam = m.home && TEAMS[m.home] ? TEAMS[m.home] : null;
        const awayTeam = m.away && TEAMS[m.away] ? TEAMS[m.away] : null;
        const p = currentPlayerPreds.preds[m.id] || {};
        const isGolden = currentPlayerPreds.goldenMatch === m.id;
        const hasPred = p.h !== undefined && p.a !== undefined;
        const isTBD = !homeTeam || !awayTeam;
        
        let statusHtml = '';
        const st = getMatchStatus(m);
        if (st === 'played' || st === 'ended') statusHtml = `<span class="ap-match-status played">انتهت</span>`;
        else if (st === 'live') statusHtml = `<span class="ap-match-status live">مباشر</span>`;
        else statusHtml = `<span class="ap-match-status upcoming">${m.time}</span>`;

        const homeName = homeTeam ? homeTeam.name : 'يُحدد لاحقاً';
        const awayName = awayTeam ? awayTeam.name : 'يُحدد لاحقاً';
        const homeFlag = homeTeam ? `<img src="${flagUrl(homeTeam.iso)}" class="flag-sm" alt="">` : '';
        const awayFlag = awayTeam ? `<img src="${flagUrl(awayTeam.iso)}" class="flag-sm" alt="">` : '';

        html += `
          <div class="ap-match-row ${hasPred ? 'has-pred' : ''} ${isGolden ? 'is-golden-row' : ''}" ${isTBD ? 'style="opacity:0.4"' : ''}>
            <button class="ap-golden-star ${isGolden ? 'active' : ''}" data-mid="${m.id}" title="تعيين كمباراة ذهبية" ${isTBD ? 'disabled' : ''}>★</button>
            <div class="ap-match-info">
              <span class="team-txt">${homeName}</span>
              ${homeFlag}
              <span class="vs-txt">VS</span>
              ${awayFlag}
              <span class="team-txt">${awayName}</span>
            </div>
            ${statusHtml}
            <div class="ap-score-inputs">
              <input type="number" class="ap-h-input" data-mid="${m.id}" min="0" max="20" placeholder="-" value="${p.h !== undefined ? p.h : ''}" ${isTBD ? 'disabled' : ''}>
              <span class="dash">-</span>
              <input type="number" class="ap-a-input" data-mid="${m.id}" min="0" max="20" placeholder="-" value="${p.a !== undefined ? p.a : ''}" ${isTBD ? 'disabled' : ''}>
            </div>
          </div>
        `;
      });

      html += `
        </div>
        <button class="ap-save-btn" id="ap-save-preds-btn">حفظ توقعات اللاعب</button>
      `;
      
      container.innerHTML = html;

      // Attach Golden Star logic
      container.querySelectorAll('.ap-golden-star').forEach(btn => {
        btn.addEventListener('click', () => {
          if (btn.disabled) return;
          const mid = btn.dataset.mid;
          currentPlayerPreds.goldenMatch = mid;
          renderPlayerPredictions();
        });
      });

      // Attach Save logic
      document.getElementById('ap-save-preds-btn').addEventListener('click', async () => {
        const saveBtn = document.getElementById('ap-save-preds-btn');
        saveBtn.textContent = 'جاري الحفظ...'; saveBtn.disabled = true;

        const newPreds = {};
        container.querySelectorAll('.ap-h-input').forEach(hInput => {
          if (hInput.disabled) return;
          const mid = hInput.dataset.mid;
          const aInput = container.querySelector(`.ap-a-input[data-mid="${mid}"]`);
          if (hInput.value !== '' && aInput.value !== '') {
            newPreds[mid] = { h: +hInput.value, a: +aInput.value };
          }
        });

        currentPlayerPreds.preds = newPreds;
        currentPlayerPreds.updatedAt = serverTimestamp();

        try {
          const predDocId = isKO(activeMD) ? `${currentPlayerUid}_ko_${activeMD}` : `${currentPlayerUid}_md${activeMD}`;
          await setDoc(doc(db, 'predictions', predDocId), currentPlayerPreds);
          adminToast('تم حفظ توقعات اللاعب بنجاح!');
          renderPlayerPredictions();
        } catch(e) {
          console.error(e); adminToast('حدث خطأ أثناء حفظ التوقعات', 'error');
        }

        saveBtn.textContent = 'حفظ توقعات اللاعب'; saveBtn.disabled = false;
      });
    }

    // CUP RE-DRAW LOGIC
    function renderCupDrawButtons() {
      const container = document.getElementById('cup-draw-buttons');
      const allKeys = ALL_MATCHDAY_KEYS;
      container.innerHTML = allKeys.map(md => {
        const info = MATCHDAY_INFO[md];
        const icon = info.icon || '🔄';
        return `<button class="save-btn cup-redraw-btn" data-md="${md}" style="flex:1;min-width:80px;padding:10px;margin:0;background:linear-gradient(135deg,rgba(232,185,35,0.8),rgba(232,185,35,1));font-size:0.72rem">${icon} ${info.name}</button>`;
      }).join('');

      container.querySelectorAll('.cup-redraw-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const mdVal = btn.dataset.md;
          const md = isNaN(mdVal) ? mdVal : +mdVal;
          const mdInfo = MATCHDAY_INFO[md];
          if (!confirm(`هل أنت متأكد من إعادة قرعة ${mdInfo.name}؟`)) return;

          btn.disabled = true;
          btn.textContent = 'جاري السحب...';
          const statusEl = document.getElementById('cup-draw-status');

          try {
            const usersSnap = await getDocs(collection(db, 'users'));
            const uids = [];
            usersSnap.forEach(d => uids.push(d.id));

            if (uids.length < 2) {
              adminToast('يجب أن يكون هناك لاعبين على الأقل', 'warn');
              btn.disabled = false; btn.textContent = `${mdInfo.icon || '🔄'} ${mdInfo.name}`;
              return;
            }

            const shuffled = [...uids].sort(() => Math.random() - 0.5);
            let byePlayer = null;
            if (shuffled.length % 2 !== 0) byePlayer = shuffled.pop();
            const matchups = [];
            for (let i = 0; i < shuffled.length; i += 2) {
              matchups.push({ p1: shuffled[i], p2: shuffled[i + 1] });
            }

            const docId = isKO(md) ? `round_${md}` : `round${md}`;
            const draw = { matchday: md, matchups, byePlayer: byePlayer || null, createdAt: new Date().toISOString() };
            await setDoc(doc(db, 'cupDraws', docId), draw);

            const allUsersMap = {};
            usersSnap.forEach(d => { allUsersMap[d.id] = d.data(); });
            let statusText = `✅ تم سحب قرعة ${mdInfo.name}: `;
            matchups.forEach(m => {
              const n1 = allUsersMap[m.p1]?.displayName || 'لاعب';
              const n2 = allUsersMap[m.p2]?.displayName || 'لاعب';
              statusText += `${n1} ⚔ ${n2} | `;
            });
            if (byePlayer) statusText += `${allUsersMap[byePlayer]?.displayName || 'لاعب'} 🎫 راحة`;
            statusEl.textContent = statusText;
            adminToast(`تم سحب قرعة ${mdInfo.name} بنجاح!`);
          } catch(e) {
            console.error(e);
            adminToast('حدث خطأ أثناء سحب القرعة', 'error');
          }

          btn.disabled = false; btn.textContent = `${mdInfo.icon || '🔄'} ${mdInfo.name}`;
        });
      });
    }

  </script>
</body>
</html>
